<div class="container-fluid d-flex flex-column justify-content-center align-items-center w-100 m-0 p-0 separacion-header-home bg-img-home">

  <!-- BANNER -->
  <div class="info-banner">
    <div class="banner-stat">
      <span class="banner-label">Total Agents</span>
      <span class="banner-value">{{ totalAgents() }}</span>
    </div>

    <div class="banner-divider"></div>

    @for (role of rolesCount() | keyvalue; track role.key) {
      <div class="banner-stat">
        <img
          [src]="roleIcons[role.key]"
          [alt]="role.key"
          class="role-icon"
        />
        <span class="banner-label">{{ role.key }}</span>
        <span class="banner-value">{{ role.value }}</span>
      </div>
    }
  </div>

  <a routerLink="/agents" class="agents-btn">
    <span>Explore All Agents</span>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
      <path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/>
    </svg>
  </a>

</div>
